const categories = [
  { key: 'all', label: '全部' },
  { key: 'dev', label: '开发工具' },
  { key: 'browser', label: '浏览器自动化' },
  { key: 'search', label: '搜索' },
  { key: 'database', label: '数据库' },
  { key: 'scrape', label: '网页抓取' },
  { key: 'design', label: '设计对接' },
  { key: 'productivity', label: '效率工具' },
  { key: 'file', label: '文件处理' },
];

let currentFilter = 'all';

function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = categories.map(c =>
    `<button class="filter-btn${c.key === currentFilter ? ' active' : ''}" onclick="setFilter('${c.key}', this)">${c.label}</button>`
  ).join('');
}

function setFilter(key, btn) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterServers();
}

function getTagClass(tag) {
  const map = { official: 'tag-official', community: 'tag-community', microsoft: 'tag-microsoft' };
  return map[tag] || 'tag-community';
}

function renderServers(list) {
  const grid = document.getElementById('grid');
  document.getElementById('serverCount').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>没有找到匹配的服务器</h3><p>试试其他关键词或分类</p></div>`;
    return;
  }

  grid.innerHTML = list.map((s, i) => `
    <div class="card" style="animation-delay:${i * 0.03}s">
      <div class="card-header">
        <div class="card-icon" style="background:${s.iconBg}22; color:${s.iconBg}">${s.icon}</div>
        <div class="card-title">
          ${s.name}
          <small>${s.vendor}</small>
        </div>
      </div>
      <div class="card-meta">
        <span class="tag ${getTagClass(s.tag)}">${s.tagLabel}</span>
        <span class="category-tag">${s.category}</span>
        <span class="stars">⭐ ${s.stars}</span>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="install-block" onclick="copyInstall(this, '${s.install.replace(/'/g, "\\'").replace(/\n/g, '\\n')}')" title="点击复制安装命令">
        <code>${s.install.replace(/\n/g, '<br>')}</code>
        <span class="copy-hint">📋 点击复制</span>
      </div>
      <div class="rating-row">
        <span class="rating-star">★</span>
        <span class="rating-num">${s.rating}</span>
        <span class="rating-label">${s.ratingReason}</span>
      </div>
    </div>
  `).join('');
}

function filterServers() {
  const query = document.getElementById('search').value.toLowerCase();
  let filtered = servers;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(s => s.categoryEn === currentFilter || s.tag === currentFilter);
  }

  if (query) {
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(query) ||
      s.desc.includes(query) ||
      s.category.includes(query) ||
      s.vendor.includes(query)
    );
  }

  renderServers(filtered);
}

function copyInstall(el, cmd) {
  const text = cmd.replace(/\\n/g, '\n').replace(/<br>/g, '\n');
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    el.querySelector('.copy-hint').textContent = '✅ 已复制';
    setTimeout(() => {
      el.classList.remove('copied');
      el.querySelector('.copy-hint').textContent = '📋 点击复制';
    }, 2000);
  });
}

// Init
renderFilters();
renderServers(servers);
</script>
